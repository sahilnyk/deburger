[tool.poetry]
name = "deburger"
version = "0.1.0"
description = "AI-powered debugging tool that fixes bugs automatically"
authors = ["Sahil Nayak <sahilnayak2056@gmail.com>"]
readme = "README.md"
license = "MIT"
homepage = "https://github.com/sahilnyk/deburger"
repository = "https://github.com/sahilnyk/deburger"
keywords = ["debugging", "ai", "testing", "automation"]

[tool.poetry.dependencies]
python = "^3.9"
typer = "^0.9.0"
rich = "^13.7.0"
pydantic = "^2.5.0"
pydantic-settings = "^2.1.0"
openai = "^1.6.0"
anthropic = "^0.18.0"
httpx = "^0.26.0"
pytest = "^7.4.0"
GitPython = "^3.1.40"
PyGithub = "^2.1.1"
black = "^24.1.0"
structlog = "^24.1.0"
PyYAML = "^6.0.1"

[tool.poetry.group.dev.dependencies]
pytest-cov = "^4.1.0"
mypy = "^1.8.0"
ruff = "^0.1.0"

[tool.poetry.scripts]
deburger = "deburger.cli.main:app"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.black]
line-length = 100
target-version = ["py39", "py310", "py311"]

[tool.ruff]
line-length = 100
target-version = "py39"

[tool.mypy]
python_version = "3.9"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --cov=src --cov-report=term-missing"
