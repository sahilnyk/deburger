[tool.poetry]
name = "deburger"
version = "0.2.0"
description = "AI Code Quality Guardian - Monitor AI-generated code quality and requirement alignment"
authors = ["Sahil Nayak <sahilnayak2056@gmail.com>"]
readme = "README.md"
license = "MIT"
homepage = "https://github.com/sahilnyk/deburger"
repository = "https://github.com/sahilnyk/deburger"
keywords = ["ai", "code-quality", "security", "monitoring", "testing"]

[tool.poetry.dependencies]
python = "^3.9"
typer = "^0.9.0"
rich = "^13.7.0"
questionary = "^2.0.1"
click = "^8.1.7"
pygments = "^2.17.0"
tabulate = "^0.9.0"
openai = { version = "^1.6.0", optional = true }
anthropic = { version = "^0.18.0", optional = true }
PyYAML = "^6.0.1"

[tool.poetry.extras]
llm = ["openai", "anthropic"]

[tool.poetry.scripts]
deburger = "deburger.cli.main:app"

[tool.poetry.group.dev.dependencies]
pytest-cov = "^4.1.0"
mypy = "^1.8.0"
ruff = "^0.1.0"

[tool.poetry.scripts]
deburger = "deburger.cli.main:app"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.black]
line-length = 100
target-version = ["py39", "py310", "py311"]

[tool.ruff]
line-length = 100
target-version = "py39"

[tool.mypy]
python_version = "3.9"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --cov=src --cov-report=term-missing"
