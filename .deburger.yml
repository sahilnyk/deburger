# deburger configuration for self-monitoring

requirement: "Build AI code quality monitoring system"

sub_goals:
  - id: analyzer
    description: "Code change analysis with git diff parsing"
    weight: 20
  - id: security
    description: "Security vulnerability detection (OWASP Top 10)"
    weight: 25
  - id: metrics
    description: "Code quality metrics calculation"
    weight: 15
  - id: requirements
    description: "Requirement progress tracking"
    weight: 15
  - id: guidance
    description: "AI steering with guardrails"
    weight: 15
  - id: testing
    description: "Test generation and validation"
    weight: 10

llm:
  provider: openai
  api_key: ${OPENAI_API_KEY}
  model: gpt-4

  guardrails:
    - "Never disable security features"
    - "Always validate user input"
    - "No hardcoded credentials"
    - "Prefer explicit over implicit"
    - "Use type hints for all functions"

  prompts:
    guidance: |
      You are {{progress}}% toward building a complete code quality monitoring system.
      Current focus: {{next_focus}}
      Security issues found: {{security_count}}

      Next steps:
      1. {{next_action}}
      2. Maintain code quality above 80/100
      3. Keep complexity under 10 per function
      4. Add tests for all new features

security:
  enabled: true
  fail_on_high: true
  ignore_patterns:
    - tests/
    - examples/
    - docs/

metrics:
  min_quality_score: 70
  max_complexity: 10
  min_test_coverage: 80
